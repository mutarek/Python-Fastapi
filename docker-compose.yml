version: "3.9"

services:
  db:
    image: postgres:16
    container_name: fast_postgres
    environment:
      POSTGRES_DB: fastapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fast_api
    environment:
      APP_NAME: FastTime API
      APP_VERSION: 1.0.0
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
